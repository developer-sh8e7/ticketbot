<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عجلة سرقة البرينروت | Premium Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    /* 
      ========================================
      PREMIUM BRAINROT DESIGN SYSTEM v2.0
      ========================================
    */
    :root {
      --bg: #030308;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --secondary: #ec4899;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-hover: rgba(255, 255, 255, 0.06);
      --card-bg: rgba(10, 10, 20, 0.85);
      
      --common: #94a3b8;
      --uncommon: #22c55e;
      --rare: #3b82f6;
      --epic: #a855f7;
      --legendary: #f59e0b;
      --secret: #ef4444;
      
      --font-main: 'Tajawal', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background-color: var(--bg);
      color: #fff;
      font-family: var(--font-main);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Background Effects */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }

    /* Loading Screen */
    .loader-wrapper {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .loader-icon {
      width: 80px;
      height: 80px;
      border: 4px solid var(--glass-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Layout */
    .app-wrapper {
      width: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      margin-bottom: 2.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .brand-icon {
      font-size: 2.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--accent)); }
      50% { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--accent)); }
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .btn-auth {
      background: #5865f2;
      color: #fff;
      padding: 0.75rem 1.75rem;
      border-radius: 14px;
      border: none;
      font-family: var(--font-main);
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3);
    }

    .btn-auth:hover {
      background: #4752c4;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--glass);
      padding: 0.5rem 1.25rem;
      border-radius: 50px;
      border: 1px solid var(--glass-border);
    }

    .user-profile img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--accent);
    }

    .user-profile span {
      font-weight: 700;
      font-size: 1rem;
    }

    /* Main Grid */
    .dashboard {
      display: grid;
      grid-template-columns: 380px 1fr 380px;
      gap: 2.5rem;
      flex: 1;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .premium-panel {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .premium-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent), var(--secondary));
    }

    .premium-panel h3 {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #cbd5e1;
    }

    /* Wheel Section */
    .wheel-core {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
    }

    .wheel-container {
      position: relative;
      width: 720px;
      height: 720px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
      padding: 20px;
      border-radius: 50%;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.6));
      transform: rotate(0deg);
    }

    .wheel-center-ui {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      z-index: 100;
    }

    .spin-trigger {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%);
      border: 5px solid #fff;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.2);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .spin-trigger:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 15px 45px rgba(124, 58, 237, 0.5);
    }

    .spin-trigger:active:not(:disabled) {
      transform: scale(0.95);
    }

    .spin-trigger:disabled {
      filter: grayscale(1);
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spin-main { font-size: 1.8rem; font-weight: 900; letter-spacing: 1px; }
    .spin-hint { font-size: 0.7rem; font-weight: 700; opacity: 0.8; margin-top: 2px; }

    .wheel-pointer-premium {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 80px;
      z-index: 110;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
    }

    /* Rarity Tags */
    .rarity-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .tag {
      padding: 0.5rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 800;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      transition: all 0.3s;
    }

    .tag.common { color: var(--common); border-color: rgba(148, 163, 184, 0.2); }
    .tag.uncommon { color: var(--uncommon); border-color: rgba(34, 197, 94, 0.2); }
    .tag.rare { color: var(--rare); border-color: rgba(59, 130, 246, 0.2); }
    .tag.epic { color: var(--epic); border-color: rgba(168, 85, 247, 0.2); }
    .tag.legendary { color: var(--legendary); border-color: rgba(245, 158, 11, 0.2); }
    .tag.secret { color: var(--secret); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }

    /* Lists & Items */
    .item-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .list-entry {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--glass);
      border-radius: 18px;
      border: 1px solid var(--glass-border);
      transition: transform 0.2s, background 0.2s;
    }

    .list-entry:hover {
      background: var(--glass-hover);
      transform: translateX(-8px);
    }

    .entry-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.2);
    }

    .entry-info { flex: 1; }
    .entry-name { font-weight: 800; font-size: 1rem; margin-bottom: 2px; }
    .entry-meta { font-size: 0.8rem; font-weight: 600; opacity: 0.7; }

    /* Collection Grid */
    .coll-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 0.75rem;
    }

    .coll-box {
      aspect-ratio: 1;
      background: var(--glass);
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      transition: all 0.3s;
      cursor: pointer;
    }

    .coll-box:hover {
      transform: scale(1.1) rotate(5deg);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Modal Result */
    .modal-overlay-premium {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(15px);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-overlay-premium.active { display: flex; animation: fadeIn 0.4s forwards; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .result-card {
      background: #0a0a15;
      width: 100%;
      max-width: 500px;
      border-radius: 40px;
      padding: 3.5rem;
      text-align: center;
      border: 2px solid var(--glass-border);
      position: relative;
      box-shadow: 0 30px 100px rgba(0,0,0,0.8);
    }

    .res-glow {
      position: absolute;
      inset: 0;
      border-radius: 40px;
      box-shadow: 0 0 120px var(--accent-glow);
      pointer-events: none;
    }

    .res-img {
      width: 220px;
      height: 220px;
      margin: 0 auto 2.5rem;
      background: var(--glass);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      border: 1px solid var(--glass-border);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .res-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    .res-rarity { font-size: 1.25rem; font-weight: 800; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px; }
    .res-desc { color: #94a3b8; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem; }

    .btn-action {
      width: 100%;
      padding: 1.25rem;
      border-radius: 18px;
      border: none;
      font-family: var(--font-main);
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-confirm { background: #fff; color: #000; }
    .btn-confirm:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

    /* Stats */
    .stat-line {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--glass-border);
    }
    .stat-lbl { color: #94a3b8; font-weight: 600; }
    .stat-val { font-weight: 800; color: #fff; }

    /* Responsive */
    @media (max-width: 1500px) {
      .dashboard { grid-template-columns: 1fr; }
      .sidebar { flex-direction: row; flex-wrap: wrap; }
      .premium-panel { flex: 1; min-width: 400px; }
    }

    @media (max-width: 900px) {
      .wheel-container { width: 500px; height: 500px; }
      .app-wrapper { padding: 1rem; }
      header { flex-direction: column; gap: 1.5rem; padding: 1.5rem; }
      .premium-panel { min-width: 100%; }
    }

    @media (max-width: 600px) {
      .wheel-container { width: 350px; height: 350px; }
      .res-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="loader-wrapper" id="loader">
    <div class="loader-icon"></div>
    <h2 style="font-weight: 900; letter-spacing: 2px;">جاري تحميل عالم البرينروت...</h2>
  </div>

  <canvas id="bgCanvas"></canvas>
  <div class="vignette"></div>

  <div class="app-wrapper">
    <header>
      <div class="brand">
        <span class="brand-icon">🌀</span>
        <h1>عجلة سرقة البرينروت</h1>
      </div>
      <div class="user-section" id="userArea">
        <button class="btn-auth" id="loginBtn">
          <svg viewBox="0 0 640 512" width="20"><path d="M524.5 69.8a1.5 1.5 0 0 0 -.8-.7A485.4 485.4 0 0 0 404.1 32a1.8 1.8 0 0 0 -1.9 .9 337.5 337.5 0 0 0 -14.9 30.6 447.8 447.8 0 0 0 -134.4 0 309.5 309.5 0 0 0 -15.1 -30.6 1.9 1.9 0 0 0 -1.9 -.9A483.7 483.7 0 0 0 116.1 69.1a1.7 1.7 0 0 0 -.8 .7C39.1 183.7 18.2 294.7 28.4 404.4a2 2 0 0 0 .8 1.4A487.7 487.7 0 0 0 176 479.9a1.9 1.9 0 0 0 2.1 -.7 348.2 348.2 0 0 0 31.3 -50.7 1.9 1.9 0 0 0 -1 -2.6 321.2 321.2 0 0 1 -45.9 -21.9 1.9 1.9 0 0 1 -.2 -3.1c3.1 -2.3 6.2 -4.7 9.1 -7.1a1.8 1.8 0 0 1 1.9 -.3c96.2 43.9 200.4 43.9 295.5 0a1.8 1.8 0 0 1 1.9 .2c2.9 2.4 6 4.9 9.1 7.2a1.9 1.9 0 0 1 -.2 3.1 301.4 301.4 0 0 1 -45.9 21.8 1.9 1.9 0 0 0 -1 2.6 391.1 391.1 0 0 0 31.3 50.7 1.9 1.9 0 0 0 2.1 .7 488.1 488.1 0 0 0 146.9 -74.1 2 2 0 0 0 .8 -1.4C554.7 278.1 506.4 168.2 524.5 69.8zM222.5 337.6c-29 0-52.8 -26.6-52.8 -59.2s23.1 -59.2 52.8 -59.2s53.3 26.6 52.8 59.2c0 32.6 -23.1 59.2 -52.8 59.2zm195.5 0c-29 0-52.8 -26.6-52.8 -59.2s23.1 -59.2 52.8 -59.2s53.3 26.6 52.8 59.2c0 32.6 -23.1 59.2 -52.8 59.2z" fill="white"/></svg>
          ربط الحساب بالديسكورد
        </button>
      </div>
    </header>

    <div class="dashboard">
      <div class="sidebar">
        <div class="premium-panel">
          <h3>🕒 آخر الفائزين</h3>
          <div class="item-list" id="recentSpins"></div>
        </div>
        <div class="premium-panel">
          <h3>👑 قائمة المتصدرين</h3>
          <div class="item-list" id="topPlayers"></div>
        </div>
      </div>

      <div class="wheel-core">
        <div class="wheel-container">
          <canvas id="wheelCanvas" width="900" height="900"></canvas>
          <div class="wheel-center-ui">
            <button class="spin-trigger" id="spinBtn">
              <span class="spin-main">SPIN!</span>
              <span class="spin-hint" id="centerCountdown">Login to Spin</span>
            </button>
          </div>
          <div class="wheel-pointer-premium">
            <svg viewBox="0 0 60 80"><path d="M30 0L60 80L30 65L0 80L30 0Z" fill="white" stroke="var(--accent)" stroke-width="3"/></svg>
          </div>
        </div>

        <div class="premium-panel" style="width: 100%; border: none;">
          <h3>💎 RARITY SYSTEM</h3>
          <div class="rarity-grid">
            <span class="tag common">Common</span>
            <span class="tag uncommon">Uncommon</span>
            <span class="tag rare">Rare</span>
            <span class="tag epic">Epic</span>
            <span class="tag legendary">Legendary</span>
            <span class="tag secret">Secret</span>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="premium-panel">
          <h3>🎒 حقيبة المعدات</h3>
          <div class="coll-grid" id="myCollection"></div>
        </div>
        <div class="premium-panel">
          <h3>📊 تحليلات البيانات</h3>
          <div class="analytics-content" id="analyticsContent"></div>
          <div class="stat-line" id="cooldownRow" style="display:none; border-top:1px solid var(--glass-border); margin-top:1rem;">
            <span class="stat-lbl">وقت الانتظار:</span>
            <span class="stat-val" id="countdown">--:--:--</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay-premium" id="resultModal">
    <div class="result-card">
      <div class="res-glow"></div>
      <div class="res-img" id="resultImage">🎁</div>
      <h2 class="res-title" id="resultName">--</h2>
      <div class="res-rarity" id="resultRarity">--</div>
      <p class="res-desc" id="resultDesc">تهانينا! لقد حصلت على غنيمة نادرة من عالم البرينروت.</p>
      <button class="btn-action btn-confirm" id="closeModal">فهمت ذلك!</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
