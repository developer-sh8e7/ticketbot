<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEAL THE BRAINROT | Light Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons for light weight professional feel -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #05050a;
      --accent: #7c3aed;
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --font-main: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { 
      background: var(--bg); 
      color: #fff; 
      font-family: var(--font-main); 
      direction: ltr; 
      overflow-x: hidden;
      min-height: 100vh;
    }

    .app-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 30px;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand i { color: var(--accent); }
    .brand h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }

    .btn-auth {
      background: #5865f2;
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-auth:hover { background: #4752c4; }

    .dashboard {
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 20px;
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
    }

    .panel h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Wheel Core */
    .wheel-core {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .wheel-container {
      position: relative;
      width: 600px;
      height: 600px;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
    }

    .wheel-center-ui {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .spin-trigger {
      width: 100px;
      height: 100px;
      background: var(--accent);
      border: 4px solid #fff;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
      transition: 0.2s;
    }
    .spin-trigger:hover:not(:disabled) { transform: scale(1.05); }
    .spin-trigger:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

    .spin-main { font-weight: 800; font-size: 1.2rem; }
    .spin-hint { font-size: 0.6rem; opacity: 0.7; }

    .wheel-pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      z-index: 20;
      color: #fff;
    }

    /* Lists */
    .item-list { display: flex; flex-direction: column; gap: 8px; }
    .list-entry {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      font-size: 0.85rem;
    }
    .entry-icon { color: var(--accent); }

    /* Loot Display */
    .loot-box {
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .result-card {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .res-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .res-rarity { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }
    
    .btn-confirm {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    /* Loader */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 1200px) {
      .dashboard { grid-template-columns: 1fr; }
      .wheel-container { width: 450px; height: 450px; }
    }
  </style>
</head>
<body>
  <div id="loader">
    <i data-lucide="loader-2" class="animate-spin" style="width: 40px; height: 40px; color: var(--accent);"></i>
  </div>

  <div class="app-wrapper">
    <header>
      <div class="brand">
        <i data-lucide="disc"></i>
        <h1>STEAL THE BRAINROT</h1>
      </div>
      <div id="userArea">
        <button class="btn-auth" id="loginBtn">
          <i data-lucide="log-in" style="width: 18px;"></i>
          Login with Discord
        </button>
      </div>
    </header>

    <div class="dashboard">
      <div class="sidebar">
        <div class="panel">
          <h3><i data-lucide="history" style="width: 16px;"></i> RECENT WINNERS</h3>
          <div class="item-list" id="recentSpins"></div>
        </div>
        <div class="panel" style="margin-top: 20px;">
          <h3><i data-lucide="award" style="width: 16px;"></i> LEADERBOARD</h3>
          <div class="item-list" id="topPlayers"></div>
        </div>
      </div>

      <div class="wheel-core">
        <div class="wheel-container">
          <div class="wheel-pointer">
            <i data-lucide="chevron-down" style="width: 40px; height: 40px;"></i>
          </div>
          <canvas id="wheelCanvas" width="900" height="900"></canvas>
          <div class="wheel-center-ui">
            <button class="spin-trigger" id="spinBtn">
              <span class="spin-main">SPIN</span>
              <span class="spin-hint" id="centerCountdown">3D CD</span>
            </button>
          </div>
        </div>

        <div class="panel" style="width: 100%;">
          <h3><i data-lucide="info" style="width: 16px;"></i> RARITY SYSTEM</h3>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <span style="color: #94a3b8; font-weight: 700;">Common</span>
            <span style="color: #22c55e; font-weight: 700;">Uncommon</span>
            <span style="color: #3b82f6; font-weight: 700;">Rare</span>
            <span style="color: #a855f7; font-weight: 700;">Epic</span>
            <span style="color: #f59e0b; font-weight: 700;">Legendary</span>
            <span style="color: #ef4444; font-weight: 700;">Secret</span>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="panel">
          <h3><i data-lucide="box" style="width: 16px;"></i> LATEST LOOT</h3>
          <div id="myCollection"></div>
        </div>
        <div class="panel" style="margin-top: 20px;">
          <h3><i data-lucide="bar-chart-2" style="width: 16px;"></i> ANALYTICS</h3>
          <div id="analyticsContent"></div>
          <div id="cooldownRow" style="display:none; margin-top: 15px; font-size: 0.8rem; color: #94a3b8;">
            Wait Time: <span id="countdown" style="color: #fff; font-weight: 800;">--:--:--</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="resultModal">
    <div class="result-card">
      <h2 class="res-title" id="resultName">--</h2>
      <div class="res-rarity" id="resultRarity">--</div>
      <p style="color: #94a3b8; margin-bottom: 30px;">You've received a new loot from the Brainrot world.</p>
      <button class="btn-confirm" id="closeModal">GOT IT</button>
    </div>
  </div>

  <script>
    // Initializing Lucide icons
    lucide.createIcons();
  </script>
  <script src="app.js"></script>
</body>
</html>
