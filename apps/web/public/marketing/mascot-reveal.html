<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Opi AI — TikTok Mascot Ad</title>
<style>
  :root {
    --bg: #050505;
    --dot: #242424;
    --coral: #e37257;
    --coral-2: #ff8a00;
    --glow: rgba(255, 138, 0, 0.62);
    --text: #fff7ed;
    --muted: #b7afa7;
    --panel: rgba(9, 9, 11, 0.88);
    --border: rgba(227, 114, 87, 0.46);
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
  body {
    display: grid;
    place-items: center;
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }

  .stage {
    position: relative;
    width: min(100vw, 56.25vh);
    height: min(100vh, 177.78vw);
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 16%, rgba(227, 114, 87, 0.18), transparent 31%),
      radial-gradient(circle at 50% 72%, rgba(255, 138, 0, 0.13), transparent 38%),
      linear-gradient(180deg, #121212 0%, #050505 58%, #000 100%);
    isolation: isolate;
  }

  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(var(--dot) 1.45px, transparent 1.7px);
    background-size: 23px 23px;
    opacity: 0.9;
    animation: bgMove 10s linear infinite;
    z-index: -4;
  }

  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.04) 50%, rgba(0,0,0,0.04) 50%),
      radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.78) 100%);
    background-size: 100% 4px, 100% 100%;
    opacity: 0.42;
    mix-blend-mode: screen;
    z-index: 40;
  }

  @keyframes bgMove { to { background-position: 23px 23px; } }

  .topbar {
    position: absolute;
    top: 20px;
    inset-inline: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    direction: ltr;
  }

  .rec {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 8px 11px;
    background: rgba(0,0,0,0.52);
    color: #fff;
    font-size: 11px;
    letter-spacing: 0.09em;
  }
  .rec i { width: 8px; height: 8px; border-radius: 99px; background: #ff4d4d; box-shadow: 0 0 14px #ff4d4d; animation: blink 0.65s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }

  .brand {
    text-align: right;
    direction: rtl;
  }
  .brand b {
    display: block;
    color: var(--coral-2);
    font-size: 18px;
    letter-spacing: 0.08em;
    text-shadow: 0 0 14px var(--glow), 0 0 26px rgba(227,114,87,0.55);
  }
  .brand span { display: block; margin-top: 4px; color: var(--muted); font-size: 10px; }

  .bubble-wrap {
    position: absolute;
    top: 78px;
    left: 50%;
    width: 86%;
    transform: translateX(-50%) scale(0.88);
    opacity: 0;
    animation: pop 0.55s cubic-bezier(.2,1.55,.35,1) 0.35s forwards;
    z-index: 12;
  }

  .bubble {
    position: relative;
    min-height: 70px;
    display: grid;
    place-items: center;
    padding: 13px 20px;
    color: #d6d6d6;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
    font-size: clamp(21px, 5.7vw, 32px);
    font-weight: 950;
    line-height: 1.25;
    text-align: center;
    text-shadow: 0 0 12px rgba(255,255,255,0.12);
  }
  .bubble::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background:
      radial-gradient(circle, #a7a7a7 2px, transparent 2.6px) top left / 14px 14px,
      rgba(0,0,0,0.22);
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    padding: 3px;
    mask-composite: exclude;
    -webkit-mask-composite: xor;
    opacity: 0.95;
    pointer-events: none;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -16px;
    right: 33%;
    width: 28px;
    height: 28px;
    border-right: 3px dotted #a7a7a7;
    border-bottom: 3px dotted #a7a7a7;
    transform: rotate(45deg);
    background: rgba(0,0,0,0.16);
  }

  @keyframes pop { to { opacity: 1; transform: translateX(-50%) scale(1); } }

  .split-word {
    position: absolute;
    top: 168px;
    left: 50%;
    transform: translateX(-50%);
    direction: ltr;
    display: flex;
    gap: 7px;
    z-index: 11;
  }
  .tile {
    width: clamp(38px, 10vw, 54px);
    height: clamp(50px, 13vw, 72px);
    display: grid;
    place-items: center;
    border: 2px solid #34322f;
    border-radius: 9px;
    background: linear-gradient(180deg, rgba(255,255,255,0.09), transparent 38%), #17181a;
    box-shadow: inset 0 0 0 3px #0b0b0c, 0 6px 0 rgba(0,0,0,0.55), 0 0 20px rgba(227,114,87,0.12);
    color: var(--coral);
    font-size: clamp(21px, 6vw, 36px);
    font-weight: 1000;
    text-shadow: 0 0 8px var(--coral), 0 0 19px rgba(227,114,87,0.55);
    opacity: 0;
    transform-origin: 50% 0;
    transform: rotateX(-88deg) translateY(-18px);
    animation: flipIn 0.56s cubic-bezier(.2,1.35,.35,1) forwards;
  }
  .tile::after { content: ""; position: absolute; left: 6px; right: 6px; top: 50%; height: 2px; background: rgba(0,0,0,0.62); }
  .tile:nth-child(2) { animation-delay: 0.08s; }
  .tile:nth-child(3) { animation-delay: 0.16s; }
  .tile:nth-child(4) { animation-delay: 0.24s; }
  .tile:nth-child(5) { animation-delay: 0.32s; }
  @keyframes flipIn { to { opacity: 1; transform: rotateX(0) translateY(0); } }

  .type-card {
    position: absolute;
    top: 260px;
    left: 50%;
    transform: translateX(-50%);
    width: 89%;
    min-height: 250px;
    padding: 14px 15px 16px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(227,114,87,0.08), transparent 40%), var(--panel);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 0 34px rgba(227,114,87,0.18);
    z-index: 10;
  }

  .type-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: ltr;
    padding-bottom: 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    color: #b8b0aa;
    font-size: 10px;
  }
  .dots { display: flex; gap: 6px; }
  .dots span { width: 8px; height: 8px; border-radius: 999px; display: block; }
  .dots span:nth-child(1) { background: #ff5f57; }
  .dots span:nth-child(2) { background: #ffbd2e; }
  .dots span:nth-child(3) { background: #28c840; }

  #typed {
    min-height: 178px;
    white-space: pre-wrap;
    direction: rtl;
    unicode-bidi: plaintext;
    text-align: right;
    color: var(--coral);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
    font-size: clamp(21px, 5.45vw, 31px);
    font-weight: 950;
    line-height: 1.58;
    text-shadow: 0 0 10px rgba(227,114,87,0.45);
  }
  .caret {
    display: inline-block;
    width: 0.45em;
    height: 1em;
    margin-inline-start: 3px;
    transform: translateY(0.18em);
    background: var(--coral);
    box-shadow: 0 0 12px var(--coral);
    animation: blink 0.65s steps(2) infinite;
  }

  .mascot-zone {
    position: absolute;
    left: 50%;
    bottom: 118px;
    transform: translateX(-50%);
    width: 96%;
    height: 270px;
    display: grid;
    place-items: center;
    z-index: 9;
    pointer-events: none;
  }
  .mascot-shadow {
    position: absolute;
    bottom: 18px;
    width: 230px;
    height: 28px;
    border-radius: 999px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.88), transparent 70%);
    filter: blur(1px);
  }
  .sprite {
    width: min(82vw, 360px);
    aspect-ratio: 1.08 / 1;
    background-image: url('/marketing/opi-mascot-sprite.png');
    background-repeat: no-repeat;
    background-size: 400% 100%;
    background-position: 0% 50%;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 22px rgba(227,114,87,0.42));
    transform-origin: 50% 100%;
    animation: mascotFloat 1.4s ease-in-out infinite;
  }
  @keyframes mascotFloat {
    0%,100% { transform: translateY(0) rotate(-1deg) scale(1); }
    50% { transform: translateY(-12px) rotate(1.2deg) scale(1.02); }
  }

  .features {
    position: absolute;
    left: 50%;
    bottom: 45px;
    transform: translateX(-50%);
    width: 89%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    z-index: 13;
  }
  .pill {
    border: 1px solid rgba(227,114,87,0.45);
    border-radius: 14px;
    padding: 10px 5px;
    background: rgba(0,0,0,0.72);
    color: var(--text);
    text-align: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
    font-size: 11px;
    font-weight: 950;
    line-height: 1.25;
    box-shadow: 0 0 18px rgba(227,114,87,0.13);
    opacity: 0;
    transform: translateY(14px);
    animation: pillIn 0.48s ease forwards;
  }
  .pill:nth-child(1) { animation-delay: 2.1s; }
  .pill:nth-child(2) { animation-delay: 2.26s; }
  .pill:nth-child(3) { animation-delay: 2.42s; }
  @keyframes pillIn { to { opacity: 1; transform: translateY(0); } }

  .cta {
    position: absolute;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    width: 90%;
    color: var(--coral);
    text-align: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
    font-size: 13px;
    font-weight: 950;
    text-shadow: 0 0 12px rgba(227,114,87,0.62);
    z-index: 13;
  }

  .burst {
    position: absolute;
    inset: -20%;
    background: radial-gradient(circle, rgba(227,114,87,0.26), transparent 55%);
    opacity: 0;
    animation: burst 7.2s linear infinite;
    z-index: -2;
  }
  @keyframes burst {
    0%, 20%, 100% { opacity: 0; transform: scale(0.7); }
    24% { opacity: 1; transform: scale(1); }
    30% { opacity: 0; transform: scale(1.15); }
  }

  .hint {
    position: absolute;
    right: 8px;
    bottom: 5px;
    direction: ltr;
    color: rgba(255,255,255,0.25);
    font-size: 8px;
    z-index: 20;
  }

  @media (max-height: 780px) {
    .bubble-wrap { top: 58px; }
    .split-word { top: 142px; }
    .type-card { top: 225px; min-height: 220px; }
    #typed { font-size: 21px; line-height: 1.5; }
    .mascot-zone { bottom: 88px; height: 235px; }
    .features { bottom: 36px; }
    .cta { bottom: 13px; font-size: 12px; }
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="burst"></div>

    <div class="topbar">
      <div class="rec"><i></i><span>REC 9:16</span></div>
      <div class="brand"><b>OPUS</b><span>Discord AI Store</span></div>
    </div>

    <div class="bubble-wrap"><div class="bubble" id="bubble">اسمعها من Opi 👇</div></div>

    <div class="split-word" aria-label="OPI AI">
      <div class="tile">O</div><div class="tile">P</div><div class="tile">I</div><div class="tile">A</div><div class="tile">I</div>
    </div>

    <section class="type-card" aria-label="Saudi Arabic ad script">
      <div class="type-head"><div class="dots"><span></span><span></span><span></span></div><div>opi-ai-launch.sketch</div></div>
      <div id="typed"></div>
    </section>

    <section class="mascot-zone" aria-label="animated Opi mascot">
      <div class="mascot-shadow"></div>
      <div class="sprite" id="sprite"></div>
    </section>

    <div class="features">
      <div class="pill">يرد على<br>الأعضاء</div>
      <div class="pill">يفهم<br>الديسكورد</div>
      <div class="pill">شغال<br>24/7</div>
    </div>

    <div class="cta">جرّب Opi AI اليوم من Opus Solutions</div>
    <div class="hint">Press R to replay</div>
  </main>

<script>
(() => {
  const LINES = [
    "السلام عليكم ورحمة الله وبركاته",
    "قد جرّبت AI في سيرفرك حق الديسكورد؟",
    "اليوم وفرنا لكم Opi AI",
    "ذكاء اصطناعي مختص بالديسكورد بشكل كامل.",
    "يرد على الأعضاء، يشرح الأوامر، يساعد الدعم، ويرتب لك السيرفر.",
    "بدون تعب... خلي سيرفرك أذكى وخدمتك أسرع.",
    "جرّبه الحين من Opus Solutions."
  ];

  const BUBBLES = [
    "اسمعها من Opi 👇",
    "سيرفرك يحتاج مساعد؟",
    "Opi AI وصل 🔥",
    "يرد ويساعد 24/7",
    "جاهز تجرّبه؟"
  ];

  const positions = ["0% 50%", "33.333% 50%", "66.666% 50%", "100% 50%"]; 
  const sprite = document.getElementById("sprite");
  const typed = document.getElementById("typed");
  const bubble = document.getElementById("bubble");

  let charTimer;
  let spriteTimer;
  let bubbleTimer;

  function escapeHtml(value) {
    return value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#039;");
  }

  function animateSprite() {
    let i = 0;
    clearInterval(spriteTimer);
    sprite.style.backgroundPosition = positions[0];
    spriteTimer = setInterval(() => {
      i = (i + 1) % positions.length;
      sprite.style.backgroundPosition = positions[i];
    }, 210);
  }

  function animateBubble() {
    let i = 0;
    clearInterval(bubbleTimer);
    bubble.textContent = BUBBLES[0];
    bubbleTimer = setInterval(() => {
      i = (i + 1) % BUBBLES.length;
      bubble.textContent = BUBBLES[i];
      bubble.parentElement.style.animation = "none";
      bubble.parentElement.offsetHeight;
      bubble.parentElement.style.animation = "pop 0.28s cubic-bezier(.2,1.55,.35,1) forwards";
    }, 2400);
  }

  function typeScript() {
    clearTimeout(charTimer);
    let line = 0;
    let char = 0;
    let out = "";
    typed.innerHTML = '<span class="caret"></span>';

    function tick() {
      const current = LINES[line];
      if (char < current.length) {
        out += current[char++];
        typed.innerHTML = escapeHtml(out) + '<span class="caret"></span>';
        charTimer = setTimeout(tick, 18 + Math.random() * 9);
        return;
      }
      if (line < LINES.length - 1) {
        out += "\n";
        line += 1;
        char = 0;
        typed.innerHTML = escapeHtml(out) + '<span class="caret"></span>';
        charTimer = setTimeout(tick, line === 1 ? 240 : 135);
        return;
      }
      charTimer = setTimeout(replay, 2500);
    }

    tick();
  }

  function replay() {
    clearTimeout(charTimer);
    document.querySelectorAll('.tile, .pill').forEach((el) => {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    });
    typeScript();
  }

  window.addEventListener('keydown', (event) => {
    if (event.key.toLowerCase() === 'r') replay();
  });

  animateSprite();
  animateBubble();
  setTimeout(typeScript, 760);
})();
</script>
</body>
</html>
