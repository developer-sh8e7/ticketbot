<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin">
    <title>التحقق من الوسيط | STB Arab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --border: #30363d;
        --accent: #5865f2;
        --accent-hover: #4752c4;
        --success: #57f287;
        --warning: #f1c40f;
        --error: #ed4245;
        --text: #e6edf3;
        --muted: #8b949e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        background:
          radial-gradient(circle at top, rgba(88, 101, 242, 0.18), transparent 36%),
          var(--bg);
        color: var(--text);
        font-family: "Cairo", system-ui, sans-serif;
      }
      .card {
        width: min(100%, 480px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      }
      .progress {
        display: grid;
        grid-template-columns: 1fr 54px 1fr;
        align-items: start;
        gap: 8px;
        margin-bottom: 28px;
      }
      .step {
        display: grid;
        justify-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      .circle {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        background: #0d1117;
        color: var(--muted);
      }
      .step.active .circle { background: var(--accent); color: #fff; border-color: var(--accent); }
      .step.done .circle { background: var(--success); color: #06120b; border-color: var(--success); }
      .line {
        height: 2px;
        background: var(--border);
        margin-top: 17px;
      }
      .line.done { background: var(--success); }
      .view { display: none; }
      .view.active { display: block; }
      .hero {
        display: grid;
        justify-items: center;
        gap: 12px;
        text-align: center;
      }
      .discord-mark {
        width: 48px;
        height: 48px;
        color: var(--accent);
      }
      h1, h2, p { margin: 0; }
      h2 {
        font-size: 24px;
        line-height: 1.35;
      }
      p {
        color: var(--muted);
        line-height: 1.8;
      }
      .welcome {
        color: var(--success);
        font-weight: 800;
        margin-bottom: 12px;
        text-align: center;
      }
      .form {
        display: grid;
        gap: 14px;
        margin-top: 20px;
      }
      input {
        width: 100%;
        height: 48px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0d1117;
        color: var(--text);
        outline: none;
        padding: 0 14px;
        font-family: inherit;
      }
      input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.16); }
      #phone {
        direction: ltr;
        text-align: center;
        font-size: 18px;
        letter-spacing: 2px;
      }
      #otp {
        direction: ltr;
        width: 220px;
        margin: 0 auto;
        text-align: center;
        font-size: 32px;
        letter-spacing: 12px;
        padding-inline-start: 24px;
      }
      button, .button-link {
        width: 100%;
        height: 48px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition: 0.2s ease;
        display: inline-grid;
        place-items: center;
        text-decoration: none;
      }
      button:hover, .button-link:hover { background: var(--accent-hover); }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .message {
        min-height: 24px;
        text-align: center;
        font-weight: 700;
      }
      .message.error { color: var(--error); }
      .message.success { color: var(--success); }
      .otp-box {
        display: none;
        gap: 12px;
        margin-top: 10px;
      }
      .otp-box.active { display: grid; }
      .countdown {
        text-align: center;
        font-weight: 800;
        color: var(--success);
      }
      .countdown.warn { color: var(--warning); }
      .countdown.danger { color: var(--error); }
      .shake { animation: shake 0.32s ease; }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
      }
      .success-card {
        text-align: center;
        animation: glow 2s infinite;
      }
      @keyframes glow {
        0%, 100% { box-shadow: 0 0 0 rgba(87, 242, 135, 0); }
        50% { box-shadow: 0 0 30px rgba(87, 242, 135, 0.3); }
      }
      .check {
        width: 86px;
        height: 86px;
        margin: 0 auto 16px;
      }
      .check circle, .check path {
        fill: none;
        stroke: var(--success);
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .check circle {
        stroke-dasharray: 240;
        stroke-dashoffset: 240;
        animation: draw 0.8s ease forwards;
      }
      .check path {
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
        animation: draw 0.45s ease forwards 0.7s;
      }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .hidden { display: none; }
      .small {
        font-size: 13px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main id="card" class="card">
      <section id="main-content">
        <div class="progress" aria-label="خطوات التحقق">
          <div id="progress-discord" class="step active">
            <div class="circle">١</div>
            <div>ربط الديسكورد</div>
          </div>
          <div id="progress-line" class="line"></div>
          <div id="progress-phone" class="step">
            <div class="circle">٢</div>
            <div>تأكيد الواتساب</div>
          </div>
        </div>

        <section id="discord-view" class="view active">
          <div class="hero">
            <svg class="discord-mark" viewBox="0 0 127.14 96.36" aria-hidden="true">
              <path fill="currentColor" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0 105.89 105.89 0 0 0 19.39 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45 65.69c-6.27 0-11.42-5.74-11.42-12.8s5.05-12.8 11.42-12.8 11.54 5.8 11.43 12.8-5.06 12.8-11.43 12.8Zm42.24 0c-6.27 0-11.42-5.74-11.42-12.8s5.05-12.8 11.42-12.8 11.54 5.8 11.43 12.8-5.06 12.8-11.43 12.8Z"/>
            </svg>
            <h2>ربط حساب الديسكورد</h2>
            <p>الخطوة الأولى للتحقق من هويتك كوسيط</p>
            <a class="button-link" href="/auth/discord">🔗 ربط حسابي بالديسكورد</a>
          </div>
        </section>

        <section id="phone-view" class="view">
          <p id="welcome" class="welcome"></p>
          <div class="hero">
            <h2>تأكيد رقم الواتساب</h2>
            <p>سيصلك رمز تحقق مكوّن من 6 أرقام على واتسابك</p>
          </div>
          <div class="form">
            <input id="phone" type="tel" inputmode="tel" placeholder="+966XXXXXXXXX" autocomplete="tel">
            <button id="send-otp" type="button">📨 إرسال رمز التحقق</button>
            <div id="send-message" class="message"></div>
            <div id="otp-box" class="otp-box">
              <p class="small">✉️ تم إرسال الرمز على واتسابك</p>
              <input id="otp" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
              <div id="countdown" class="countdown">⏱️ ينتهي الرمز خلال: 10:00</div>
              <button id="verify-otp" type="button" disabled>✅ تأكيد الرمز</button>
              <button id="resend-otp" class="hidden" type="button">إعادة إرسال</button>
              <div id="verify-message" class="message"></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <template id="success-template">
      <div class="success-card">
        <svg class="check" viewBox="0 0 90 90" aria-hidden="true">
          <circle cx="45" cy="45" r="36"></circle>
          <path d="M28 47l12 12 24-29"></path>
        </svg>
        <h2>🎉 تم التحقق بنجاح!</h2>
        <p>أنت الآن مؤهل للتقديم على رتبة الوسيط</p>
        <p class="small">عد إلى ديسكورد واضغط على زر 🛡️ التقديم على رتبة وسيط</p>
      </div>
    </template>

    <script>
      const state = {
        jwtToken: sessionStorage.getItem("jwtToken") || "",
        countdownTimer: null,
        expiresAt: 0
      };

      const els = {
        card: document.getElementById("card"),
        main: document.getElementById("main-content"),
        discordView: document.getElementById("discord-view"),
        phoneView: document.getElementById("phone-view"),
        progressDiscord: document.getElementById("progress-discord"),
        progressPhone: document.getElementById("progress-phone"),
        progressLine: document.getElementById("progress-line"),
        welcome: document.getElementById("welcome"),
        phone: document.getElementById("phone"),
        sendOtp: document.getElementById("send-otp"),
        sendMessage: document.getElementById("send-message"),
        otpBox: document.getElementById("otp-box"),
        otp: document.getElementById("otp"),
        countdown: document.getElementById("countdown"),
        verifyOtp: document.getElementById("verify-otp"),
        resendOtp: document.getElementById("resend-otp"),
        verifyMessage: document.getElementById("verify-message"),
        successTemplate: document.getElementById("success-template")
      };

      function safeText(value) {
        return String(value || "").replace(/[<>"'`;=(){}[\]\\\/]/g, "").slice(0, 100);
      }

      function setMessage(el, text, type) {
        el.className = "message" + (type ? " " + type : "");
        el.textContent = text;
      }

      function setLoading(button, text, loading) {
        button.disabled = loading;
        button.textContent = loading ? text : button.dataset.originalText;
      }

      function showView(name, payload) {
        els.discordView.classList.toggle("active", name === "discord");
        els.phoneView.classList.toggle("active", name === "phone");
        els.progressDiscord.className = "step " + (name === "discord" ? "active" : "done");
        els.progressPhone.className = "step " + (name === "phone" ? "active" : name === "done" ? "done" : "");
        els.progressLine.className = "line " + (name === "phone" || name === "done" ? "done" : "");

        if (name === "phone") {
          els.welcome.textContent = "أهلاً " + safeText(payload && payload.displayName ? payload.displayName : payload && payload.username ? payload.username : "") + " 👋";
        }

        if (name === "done") {
          els.card.innerHTML = "";
          els.card.appendChild(els.successTemplate.content.cloneNode(true));
        }
      }

      async function api(path, options) {
        const headers = Object.assign({ "Content-Type": "application/json" }, options && options.headers ? options.headers : {});
        if (state.jwtToken) headers.Authorization = "Bearer " + state.jwtToken;
        const response = await fetch(path, Object.assign({
          credentials: "include",
          headers
        }, options || {}));
        const contentType = response.headers.get("content-type") || "";
        const data = contentType.includes("application/json") ? await response.json() : { message: await response.text() };
        if (!response.ok) {
          throw new Error(data.message || "حدث خطأ، حاول مرة أخرى");
        }
        return data;
      }

      function phoneValue() {
        return els.phone.value.replace(/[\s.\-]/g, "");
      }

      function validPhone(value) {
        return /^\+[1-9]\d{6,14}$/.test(value);
      }

      function updateCountdown() {
        const remaining = Math.max(0, Math.floor((state.expiresAt - Date.now()) / 1000));
        const minutes = String(Math.floor(remaining / 60)).padStart(2, "0");
        const seconds = String(remaining % 60).padStart(2, "0");
        els.countdown.textContent = remaining > 0 ? "⏱️ ينتهي الرمز خلال: " + minutes + ":" + seconds : "❌ انتهت صلاحية الرمز";
        els.countdown.className = "countdown" + (remaining < 60 ? " danger" : remaining < 300 ? " warn" : "");
        if (remaining <= 0) {
          clearInterval(state.countdownTimer);
          els.resendOtp.classList.remove("hidden");
        }
      }

      function startCountdown(seconds) {
        clearInterval(state.countdownTimer);
        state.expiresAt = Date.now() + seconds * 1000;
        els.resendOtp.classList.add("hidden");
        updateCountdown();
        state.countdownTimer = setInterval(updateCountdown, 1000);
      }

      async function loadStatus() {
        try {
          const data = await api("/api/status", { method: "GET", headers: {} });
          if (data.jwtToken) {
            state.jwtToken = data.jwtToken;
            sessionStorage.setItem("jwtToken", data.jwtToken);
          }
          if (data.step === "done") showView("done", data);
          else if (data.step === "phone") showView("phone", data);
          else showView("discord", data);
        } catch {
          showView("discord", {});
        }
      }

      els.sendOtp.dataset.originalText = els.sendOtp.textContent;
      els.verifyOtp.dataset.originalText = els.verifyOtp.textContent;
      els.resendOtp.dataset.originalText = els.resendOtp.textContent;

      els.phone.addEventListener("input", () => {
        els.phone.value = els.phone.value.replace(/[^\d+\s.\-]/g, "").slice(0, 20);
      });

      els.otp.addEventListener("input", () => {
        els.otp.value = els.otp.value.replace(/\D/g, "").slice(0, 6);
        els.verifyOtp.disabled = els.otp.value.length !== 6;
      });

      async function sendOtp() {
        const phone = phoneValue();
        setMessage(els.sendMessage, "", "");
        if (!validPhone(phone)) {
          setMessage(els.sendMessage, "اكتب الرقم بصيغة دولية صحيحة مثل +966XXXXXXXXX", "error");
          return;
        }
        try {
          setLoading(els.sendOtp, "جاري الإرسال...", true);
          const data = await api("/api/send-otp", {
            method: "POST",
            body: JSON.stringify({ phoneNumber: phone })
          });
          setMessage(els.sendMessage, "تم إرسال رمز التحقق.", "success");
          els.otpBox.classList.add("active");
          els.otp.focus();
          startCountdown(Number(data.expiresIn || 600));
        } catch (error) {
          setMessage(els.sendMessage, error.message || "تعذر إرسال الرمز.", "error");
        } finally {
          setLoading(els.sendOtp, "", false);
        }
      }

      async function verifyOtp() {
        const phone = phoneValue();
        const otp = els.otp.value;
        setMessage(els.verifyMessage, "", "");
        if (!validPhone(phone) || !/^\d{6}$/.test(otp)) {
          setMessage(els.verifyMessage, "تأكد من الرقم والرمز.", "error");
          return;
        }
        try {
          setLoading(els.verifyOtp, "جاري التحقق...", true);
          await api("/api/verify-otp", {
            method: "POST",
            body: JSON.stringify({ phoneNumber: phone, otp })
          });
          showView("done", {});
        } catch (error) {
          els.otp.classList.remove("shake");
          void els.otp.offsetWidth;
          els.otp.classList.add("shake");
          setMessage(els.verifyMessage, error.message || "رمز غير صحيح.", "error");
        } finally {
          setLoading(els.verifyOtp, "", false);
          els.verifyOtp.disabled = els.otp.value.length !== 6;
        }
      }

      els.sendOtp.addEventListener("click", sendOtp);
      els.resendOtp.addEventListener("click", sendOtp);
      els.verifyOtp.addEventListener("click", verifyOtp);
      document.addEventListener("DOMContentLoaded", loadStatus);
    </script>
  </body>
</html>
